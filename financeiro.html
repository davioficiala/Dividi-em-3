<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Financeiro</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f5f5f5;
}

.container{
    max-width:390px;
    margin:auto;
    padding:20px;
}

.titulo{
    font-size:24px;
    font-weight:bold;
    margin-bottom:20px;
}

.card{
    background:white;
    padding:15px;
    border-radius:15px;
    margin-bottom:15px;
    box-shadow:0 2px 8px rgba(0,0,0,.08);
}

label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
}

input{
    width:100%;
    padding:10px;
    border:1px solid #ddd;
    border-radius:10px;
    margin-bottom:10px;
    box-sizing:border-box;
}

.total{
    font-size:26px;
    font-weight:bold;
    color:#16a34a;
}

.botao{
    width:100%;
    padding:15px;
    border:none;
    border-radius:15px;
    background:#16a34a;
    color:white;
    font-size:16px;
    font-weight:bold;
}
</style>
</head>
<body>

<div class="container">

<div class="titulo">💰 Financeiro</div>

<div class="card">

<label>💼 Salário</label>
<input type="number" id="salario" value="0">

<label>👴 INSS</label>
<input type="number" id="inss" value="0">

<label>👨‍👩‍👧 Bolsa Família</label>
<input type="number" id="bolsa" value="0">

<label>🛒 Vendas</label>
<input type="number" id="vendas" value="0">

<label>💵 Renda Extra</label>
<input type="number" id="extra" value="0">

<label>📈 Rendimentos</label>
<input type="number" id="rendimentos" value="0">

<label>➕ Outras Entradas</label>
<input type="number" id="outras" value="0">

<button class="botao" onclick="calcular()">
Calcular Total
</button>

</div>

<div class="card">
    <h3>💰 Total de Entradas</h3>
    <div class="total" id="total">
        R$ 0,00
    </div>
</div>

</div>

<script>
function calcular(){

let salario = double(document.getElementById("salario").value);
let inss = Number(document.getElementById("inss").value);
let bolsa = Number(document.getElementById("bolsa").value);
let vendas = Number(document.getElementById("vendas").value);
let extra = Number(document.getElementById("extra").value);
let rendimentos = Number(document.getElementById("rendimentos").value);
let outras = Number(document.getElementById("outras").value);

let total =
salario +
inss +
bolsa +
vendas +
extra +
rendimentos +
outras;

document.getElementById("total").innerHTML =
"R$ " + total.toFixed(2);
}
</script>

</body>
</html>
