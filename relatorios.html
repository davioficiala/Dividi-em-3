<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relatórios</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    margin:0;
}

.container{
    max-width:390px;
    margin:auto;
    background:white;
    min-height:100vh;
    padding:20px;
}

.titulo{
    font-size:24px;
    font-weight:bold;
    margin-bottom:20px;
}

.card{
    background:#f8f8f8;
    padding:15px;
    border-radius:12px;
    margin-bottom:15px;
    box-shadow:0 2px 5px rgba(0,0,0,.1);
}

.valor{
    font-size:22px;
    font-weight:bold;
    color:#16a34a;
}

.botao{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#16a34a;
    color:white;
    font-size:16px;
    font-weight:bold;
    margin-top:10px;
}
</style>
</head>
<body>

<div class="container">

<div class="titulo">📊 Relatórios</div>

<div class="card">
    <h3>💰 Total de Vendas</h3>
    <div class="valor">R$ 0,00</div>
</div>

<div class="card">
    <h3>🛒 Total de Compras</h3>
    <div class="valor">0</div>
</div>

<div class="card">
    <h3>📦 Produtos Cadastrados</h3>
    <div class="valor">0</div>
</div>

<div class="card">
    <h3>👥 Clientes Cadastrados</h3>
    <div class="valor">0</div>
</div>

<button class="botao">
    📥 Exportar Relatório
</button>

</div>

</body>
</html>
